<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>El Guardián del Grifo — AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #hint {
        position: fixed;
        left: 0; right: 0; bottom: 16px;
        text-align: center;
        font-family: sans-serif;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        z-index: 10;
        pointer-events: none;
        font-size: 15px;
      }
    </style>

    <script>
      /*
        OCCLUDER COMPONENT
        ------------------
        On every loaded GLB, find any mesh whose name contains "occluder"
        (case-insensitive) and turn it into an invisible depth-mask.
        - colorWrite=false → the mesh draws NOTHING visible
        - depthWrite=true  → but it still writes to the depth buffer,
          so things behind it are hidden
        - renderOrder = -1000 makes the occluder draw FIRST, so its depth
          info is in place before any other mesh tries to draw.
        - Every other mesh gets renderOrder = 1, forcing them to draw AFTER.
      */
      AFRAME.registerComponent('occluder-model', {
        init: function () {
          this.el.addEventListener('model-loaded', (e) => {
            const root = e.detail.model;
            let count = 0;
            const allMeshNames = [];
            root.traverse((node) => {
              if (node.isMesh) {
                allMeshNames.push(node.name || '(unnamed)');
                if (node.name && node.name.toLowerCase().includes('occluder')) {
                  const occMat = new THREE.MeshBasicMaterial();
                  occMat.colorWrite = false;
                  occMat.depthWrite = true;
                  occMat.depthTest  = true;
                  occMat.side       = THREE.DoubleSide;
                  node.material = occMat;
                  node.renderOrder = -1000;
                  count++;
                  console.log('[occluder-model] MASKED mesh:', node.name);
                } else {
                  node.renderOrder = 1;
                }
              }
            });
            console.log('[occluder-model] ==== SUMMARY ====');
            console.log('[occluder-model] Total meshes in GLB:', allMeshNames.length);
            console.log('[occluder-model] Occluder meshes masked:', count);
            console.log('[occluder-model] ALL mesh names:', allMeshNames);
          });
        }
      });

      // Hide the hint text when ANY marker is detected; show it when all are lost.
      window.addEventListener('load', () => {
        const markers = document.querySelectorAll('a-marker');
        const hint = document.getElementById('hint');
        let foundCount = 0;
        markers.forEach((m) => {
          m.addEventListener('markerFound', () => {
            foundCount++;
            hint.style.display = 'none';
          });
          m.addEventListener('markerLost', () => {
            foundCount = Math.max(0, foundCount - 1);
            if (foundCount === 0) hint.style.display = 'block';
          });
        });
      });
    </script>
  </head>

  <body>
    <div id="hint">Point your camera at a marker (<b>Hiro</b>, <b>Kanji</b>, or <b>A</b>)</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true; sortObjects: true; alpha: true"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; trackingMethod: best;"
    >
      <!-- Preload all three models so they're ready when their marker is seen -->
      <a-assets>
        <a-asset-item id="box1" src="box1.glb"></a-asset-item>
        <a-asset-item id="box2" src="box2.glb"></a-asset-item>
        <a-asset-item id="box3" src="box3.glb"></a-asset-item>
      </a-assets>

      <!--
        BOX 1 — Apartment scene (Julia at window / Daniel washing dishes)
        Marker: HIRO preset
        Occluder plane in Blender at Y=2.25, same as Box 2 → same tuning starting point.
      -->
      <a-marker preset="hiro" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="4">
        <a-entity
          gltf-model="#box1"
          occluder-model
          position="0 -0.75 0"
          rotation="90 180 0"
          scale="0.30 0.30 0.30"
        ></a-entity>
      </a-marker>

      <!--
        BOX 2 — Stairwell scene (mom climbing stairs)
        Marker: KANJI preset
        These values were tuned on the printed Kanji marker and looked good.
      -->
      <a-marker preset="kanji" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="4">
        <a-entity
          gltf-model="#box2"
          occluder-model
          position="0 -0.75 0"
          rotation="90 180 0"
          scale="0.30 0.30 0.30"
        ></a-entity>
      </a-marker>

      <!--
        BOX 3 — Rich/poor contrast (modern house + pool + gardener vs poor apartment + mom)
        Marker: Custom "A" pattern (pattern-tracker_a.patt)
        Occluder plane in Blender at Y=1.5 (NOT 2.25 like the others).
        Because the occluder Y is smaller, the position offset needs to be
        proportionally smaller too: 1.5/2.25 × 0.75 ≈ 0.5. Starting at -0.5.
      -->
      <a-marker type="pattern" url="pattern-tracker_a.patt" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="4">
        <a-entity
          gltf-model="#box3"
          occluder-model
          position="0 -0.5 0"
          rotation="90 180 0"
          scale="0.30 0.30 0.30"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
