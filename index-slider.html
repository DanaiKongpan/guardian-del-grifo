<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>El Guardián del Grifo — Box 2 (AR) — SLIDER XYZ</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
      #hint {
        position: fixed;
        left: 0; right: 0; bottom: 16px;
        text-align: center;
        font-family: sans-serif;
        color: #fff;
        text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        z-index: 10;
        pointer-events: none;
        font-size: 15px;
      }
      #panel {
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 20;
        background: rgba(0,0,0,0.6);
        color: #fff;
        font-family: sans-serif;
        padding: 8px 12px 10px;
        box-sizing: border-box;
      }
      #panel .row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
      #panel label { font-size: 13px; width: 74px; white-space: nowrap; }
      #panel input[type=range] { flex: 1; height: 28px; }
      #panel .val {
        font-variant-numeric: tabular-nums;
        font-size: 14px;
        font-weight: bold;
        min-width: 52px;
        text-align: right;
      }
      #panel .hintline { font-size: 11px; opacity: 0.8; margin-top: 5px; }
      #summary {
        font-family: monospace;
        font-size: 12px;
        margin-top: 6px;
        padding: 5px 7px;
        background: rgba(255,255,255,0.12);
        border-radius: 4px;
        word-break: break-all;
      }
    </style>

    <script>
      AFRAME.registerComponent('occluder-model', {
        init: function () {
          this.el.addEventListener('model-loaded', (e) => {
            const root = e.detail.model;
            let count = 0;
            root.traverse((node) => {
              if (node.isMesh) {
                if (node.name && node.name.toLowerCase().includes('occluder')) {
                  const occMat = new THREE.MeshBasicMaterial();
                  occMat.colorWrite = false;
                  occMat.depthWrite = true;
                  occMat.depthTest = true;
                  occMat.side = THREE.DoubleSide;
                  node.material = occMat;
                  node.renderOrder = -1000;
                  count++;
                } else {
                  node.renderOrder = 1;
                }
              }
            });
            console.log('[occluder-model] Occluder meshes masked:', count);
          });
        }
      });

      window.addEventListener('load', () => {
        const marker = document.querySelector('a-marker');
        const hint = document.getElementById('hint');
        if (marker) {
          marker.addEventListener('markerFound', () => { hint.style.display = 'none'; });
          marker.addEventListener('markerLost', () => { hint.style.display = 'block'; });
        }

        const wrapper = document.getElementById('model-wrapper');
        const sx = document.getElementById('xslider');
        const sy = document.getElementById('yslider');
        const sz = document.getElementById('zslider');
        const vx = document.getElementById('xval');
        const vy = document.getElementById('yval');
        const vz = document.getElementById('zval');
        const summary = document.getElementById('summary');

        function apply() {
          const x = parseFloat(sx.value);
          const y = parseFloat(sy.value);
          const z = parseFloat(sz.value);
          wrapper.setAttribute('position', {x: x, y: y, z: z});
          vx.textContent = x.toFixed(2);
          vy.textContent = y.toFixed(2);
          vz.textContent = z.toFixed(2);
          summary.textContent =
            'position="' + x.toFixed(2) + ' ' + y.toFixed(2) + ' ' + z.toFixed(2) + '"';
        }

        sx.addEventListener('input', apply);
        sy.addEventListener('input', apply);
        sz.addEventListener('input', apply);
        apply();
      });
    </script>
  </head>

  <body>
    <div id="panel">
      <div class="row">
        <label>X (horiz)</label>
        <input id="xslider" type="range" min="-3" max="3" step="0.05" value="0" />
        <span class="val" id="xval">0.00</span>
      </div>
      <div class="row">
        <label>Y (vert)</label>
        <input id="yslider" type="range" min="-3" max="3" step="0.05" value="-0.95" />
        <span class="val" id="yval">-0.95</span>
      </div>
      <div class="row">
        <label>Z (depth)</label>
        <input id="zslider" type="range" min="-3" max="3" step="0.05" value="0" />
        <span class="val" id="zval">0.00</span>
      </div>
      <div id="summary">position="0.00 -0.95 0.00"</div>
      <div class="hintline">Drag each slider. When aligned, copy the line above (or tell me the 3 numbers).</div>
    </div>

    <div id="hint">Point your camera at the <b>Kanji</b> marker</div>

    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="colorManagement: true; sortObjects: true; alpha: true"
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; trackingMethod: best;"
    >
      <a-assets>
        <a-asset-item id="box2" src="box2.glb"></a-asset-item>
      </a-assets>

      <a-marker preset="kanji" smooth="true" smoothCount="8" smoothTolerance="0.01" smoothThreshold="4">
        <a-entity
          id="model-wrapper"
          gltf-model="#box2"
          occluder-model
          position="0 -0.95 0"
          rotation="90 180 0"
          scale="0.30 0.30 0.30"
        ></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
